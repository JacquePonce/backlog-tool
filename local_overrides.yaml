# Manual overrides for items generated by scripts/sources/*.py (Slack, Gemini, Confluence).
# Keyed by the stable item id. Applied AFTER each daily_refresh.py run so they survive re-ingest.
#
# Common use: close Slack/Gemini/Confluence loops that have no native status.
# Allowed fields per id:
#   status:        backlog | selected_for_development | in_progress | in_review | blocked | done | canceled | snoozed
#   snooze_until:  YYYY-MM-DD  (ignored unless status=snoozed; item re-enters backlog on/after this date)
#   note:          free text (shown under description)
#   front:         override the inferred front slug
#   priority:      critical | urgent | next_steps | medium | backlog
#
# Jira rows already carry real status from Jira; prefer changing Jira rather than overriding here.
version: 1

overrides: {}
  # Example:
  # slack-C07KD9QAV5L-1772641511.021559:
  #   status: done
  #   note: "Answered inline on 2026-04-21"
